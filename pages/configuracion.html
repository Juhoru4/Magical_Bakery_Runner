<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configuracion</title>
    <link rel="icon" type="image/png" href="../src/img/game_icon.png">

    <link rel="stylesheet" href="../src/css/style.css">
    <link rel="stylesheet" href="../src/css/configuracion.css">

</head>
<body>

    <a href="../index.html" target="_top"> Volver al Menu </a>

    <section class="settings">
        <h1>Volumen general:</h1>
        <input type="range" id="volumenGeneral" min="0" max="1" step="0.01">

        <h1>Volumen musica:</h1>
        <input type="range" id="volumenMusica" min="0" max="1" step="0.01">

        <h1>Volumen efectos:</h1>
        <input type="range" id="volumenEfectos" min="0" max="1" step="0.01">

        <audio loop autoplay id="audioMenu">
            <source src="../src/sounds/menu.mp3" type="audio/mpeg">
            Your browser does not support the audio element.
        </audio>
    </section>

    <script type="module" src="../src/js/configuracion.js"></script>
    
</body>
</html>
