<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Menu Principal</title>
    <link rel="icon" type="image/png" href="./src/img/game_icon.png">

    <link rel="stylesheet" href="../src/css/style.css">
    <link rel="stylesheet" href="../src/css/runner.css">

    <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.183.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.183.0/examples/jsm/"
      }
    }
    </script>

</head>
<body>

  <div class="runner">

    <button id="pausar">
      +++
    </button>

    <div id="pause-modal" class="pause-modal" hidden>
      <div class="pause-modal__backdrop" data-pause-close></div>
      <div class="pause-modal__panel">
        <iframe
          id="pause-frame"
          src="runner_pausa.html"
          title="Pausa"
        ></iframe>
      </div>
    </div>

    <div id="game-over-modal" class="pause-modal" hidden>
      <div class="pause-modal__backdrop"></div>
      <div class="pause-modal__panel">
        <iframe
          id="game-over-frame"
          src="runner_game-over.html"
          title="Game Over"
        ></iframe>
      </div>
    </div>

    <script src="../src/js/runner/main.js" type="module"></script>
    <script src="../src/js/runner_pausa.js" type="module"></script>
    <script src="../src/js/runner_game-over.js" type="module"></script>

    <audio loop autoplay id="audioRunner">
      <source src="../src/sounds/runner.mp3" type="audio/mpeg">
      Your browser does not support the audio element.
    </audio>

    <script src="../src/js/mainAudio.js"></script>

    <div class="container" id="container">

      <div class="ui">
        <div class="hud-layout">
          <div class="score-layout">
          <div class="score-text" id="score-text">
            00000
          </div>
          </div>

          <div class="lives-layout">
            <span class="lives-label">Vidas</span>
            <span class="lives-value" id="lives-text">3</span>
          </div>
        </div>

        <!-- Light Controls -->
      </div>

    </div>

  </div>
    
</body>
</html>
