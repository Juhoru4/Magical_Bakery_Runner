<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../src/css/style.css">
    <link rel="stylesheet" href="../src/css/runner.css">
</head>
<body class="pause-body">
    
    <div class="pause-page">
        <button id="cerrar_pausa" type="button"></button>

        <h1>Pausa</h1>

        <div class="settings">
            <h3>Volumen general:</h3>
            <input type="range" id="volumenGeneral" min="0" max="1" step="0.01">

            <h3>Volumen musica:</h3>
            <input type="range" id="volumenMusica" min="0" max="1" step="0.01">

            <h3>Volumen efectos:</h3>
            <input type="range" id="volumenEfectos" min="0" max="1" step="0.01">
        </div>

        <div class="pause-buttons">
            <a href="./runner.html" target="_top"> Reset </a>
            <a href="../index.html" target="_top"> Volver al Menu </a>
        </div>
    </div>

    <script src="../src/js/runner_pausa.js" type="module"></script>
</body>
</html>
